<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="description" content="IPL Auction Platform - Real-time cricket player auction system" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <title>IPL Auction 2024</title>

    <style>
      body {
        margin: 0;
        background-color: #0A0E1A;
        color: #F9FAFB;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      /* Prevent FOUC */
      .loading-screen {
        position: fixed; inset: 0;
        background: #0A0E1A;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
        font-family: 'Rajdhani', sans-serif;
        font-size: 1.5rem;
        color: #FFD700;
        letter-spacing: 0.1em;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loading-screen">IPL AUCTION</div>
    </div>
  </body>
</html>
